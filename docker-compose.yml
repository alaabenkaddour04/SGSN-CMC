version: '3.8'

services:
  app:
    build: .
    ports:
      - "80:3000"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=sgsn_db
      - DB_USER=postgres
      - DB_PASSWORD=sgsn2026
      - JWT_SECRET=sgsn_cmc_secret_2026
    depends_on:
      - db
    restart: always

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=sgsn_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=sgsn2026
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres_data:
