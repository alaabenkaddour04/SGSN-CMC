<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGSN CMC | Espace Étudiant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; min-height: 100vh; }
        .glass { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); border-radius: 1rem; }
        .gradient-card { background: linear-gradient(135deg, #3b82f6, #8b5cf6); }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <div class="gradient-card rounded-3xl p-8 mb-8 text-white shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 right-0 w-64 h-64 bg-white/10 rounded-full -mr-16 -mt-16 blur-3xl"></div>
            <div class="relative z-10 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                <div class="flex items-center gap-4">
                    <img src="https://cmc.ac.ma/sites/default/files/2023-01/logo-cmc.png" class="h-16 bg-white/20 rounded-xl p-2" onerror="this.style.display='none'">
                    <div>
                        <h1 class="text-3xl font-bold">Bonjour, <span id="studentName"></span> 👋</h1>
                        <p class="text-blue-100 mt-1">Infrastructure Digitale — Cloud Computing</p>
                    </div>
                </div>
                <a href="/" onclick="localStorage.clear()" class="bg-white/20 hover:bg-white/30 text-white px-6 py-3 rounded-xl font-medium transition backdrop-blur-sm border border-white/20 flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                    Déconnexion
                </a>
            </div>
        </div>

        <!-- Cards Grid -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <!-- Notes -->
            <div class="glass p-6 border-t-4 border-blue-500">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold flex items-center gap-2">
                        <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
                        Mes Notes
                    </h2>
                    <span id="moyenne" class="text-2xl font-bold text-green-400">--</span>
                </div>
                <div id="notesList" class="space-y-3 max-h-80 overflow-y-auto"></div>
                <div class="mt-4 pt-4 border-t border-white/10 flex justify-between">
                    <span class="text-slate-400 text-sm">Moyenne</span>
                    <span id="moyenneFooter" class="font-bold text-white">--/20</span>
                </div>
            </div>

            <!-- Absences -->
            <div class="glass p-6 border-t-4 border-red-500">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold flex items-center gap-2">
                        <svg class="w-6 h-6 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                        Absences
                    </h2>
                    <span id="totalAbs" class="bg-red-500/20 text-red-400 px-3 py-1 rounded-full text-sm font-bold">0</span>
                </div>
                <div id="absencesList" class="space-y-3 max-h-80 overflow-y-auto">
                    <div class="text-center text-slate-500 py-8">
                        <svg class="w-12 h-12 mx-auto mb-3 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                        <p>Aucune absence</p>
                    </div>
                </div>
            </div>

            <!-- Emploi -->
            <div class="glass p-6 border-t-4 border-purple-500">
                <h2 class="text-xl font-bold mb-6 flex items-center gap-2 text-purple-400">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                    Emploi du Temps
                </h2>
                <div id="emploiList" class="space-y-3 max-h-80 overflow-y-auto"></div>
            </div>
        </div>

        <!-- Stats -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="glass p-4 text-center border-t-2 border-blue-500">
                <p class="text-slate-400 text-xs uppercase">Classement</p>
                <p class="text-2xl font-bold text-white">2<sup>ème</sup></p>
            </div>
            <div class="glass p-4 text-center border-t-2 border-green-500">
                <p class="text-slate-400 text-xs uppercase">Assiduité</p>
                <p class="text-2xl font-bold text-green-400">95%</p>
            </div>
            <div class="glass p-4 text-center border-t-2 border-amber-500">
                <p class="text-slate-400 text-xs uppercase">Modules</p>
                <p class="text-2xl font-bold text-amber-400">4/4</p>
            </div>
            <div class="glass p-4 text-center border-t-2 border-purple-500">
                <p class="text-slate-400 text-xs uppercase">Semestre</p>
                <p class="text-2xl font-bold text-purple-400">S2</p>
            </div>
        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user || user.role !== 'Etudiant') location.href = '/';
        document.getElementById('studentName').innerText = user.nom.split(' ')[0];

        async function loadData() {
            const stagiaires = await fetch('/api/stagiaires').then(r=>r.json());
            const me = stagiaires.find(s => s.email === user.email);
            if (!me) return;

            // Notes
            const notes = await fetch(`/api/notes/${me.stagiaire_id}`).then(r=>r.json());
            const notesDiv = document.getElementById('notesList');
            if (notes.length > 0) {
                notesDiv.innerHTML = notes.map(n=>`
                    <div class="flex justify-between items-center bg-slate-800/50 p-3 rounded-xl border-l-4 ${n.note>=10?'border-green-500':'border-red-500'}">
                        <div>
                            <span class="font-medium text-white text-sm">${n.nom_module}</span>
                        </div>
                        <span class="font-bold ${n.note>=10?'text-green-400':'text-red-400'}">${n.note}/20</span>
                    </div>
                `).join('');
                const moy = (notes.reduce((s,n)=>s+parseFloat(n.note),0)/notes.length).toFixed(2);
                document.getElementById('moyenne').innerText = moy;
                document.getElementById('moyenneFooter').innerText = moy + '/20';
            }

            // Absences
            const absences = await fetch(`/api/absences/${me.stagiaire_id}`).then(r=>r.json());
            if (absences.length > 0) {
                document.getElementById('totalAbs').innerText = absences.length;
                document.getElementById('absencesList').innerHTML = absences.map(a=>`
                    <div class="flex justify-between items-center bg-slate-800/50 p-3 rounded-xl border-l-4 ${a.justifiee?'border-amber-500':'border-red-500'}">
                        <span class="text-white text-sm">${a.nom_module}</span>
                        <span class="text-xs ${a.justifiee?'text-amber-400':'text-red-400'}">${a.justifiee?'Justifiée':'Non justifiée'}</span>
                    </div>
                `).join('');
            }

            // Emploi
            const emploi = await fetch('/api/emploi/1').then(r=>r.json());
            document.getElementById('emploiList').innerHTML = emploi.map(e=>`
                <div class="flex justify-between items-center bg-slate-800/50 p-3 rounded-xl">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-lg bg-purple-500/20 flex items-center justify-center text-purple-400 font-bold text-xs">
                            ${e.jour.substring(0,3)}
                        </div>
                        <div>
                            <span class="font-medium text-white text-sm block">${e.nom_module}</span>
                            <span class="text-xs text-slate-400">${e.heure_debut.slice(0,5)} - ${e.heure_fin.slice(0,5)}</span>
                        </div>
                    </div>
                    <span class="text-xs text-slate-500">${e.salle}</span>
                </div>
            `).join('');
        }

        loadData();
    </script>
</body>
</html>
