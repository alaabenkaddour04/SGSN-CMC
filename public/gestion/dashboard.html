<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGSN CMC | Gestionnaire</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; }
        .glass { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); border-radius: 1rem; }
        .sidebar { width: 260px; background: rgba(15, 23, 42, 0.95); border-right: 1px solid rgba(255,255,255,0.1); height: 100vh; position: fixed; left: 0; top: 0; }
        .main { margin-left: 260px; padding: 2rem; }
        .nav-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.875rem 1.25rem; margin: 0.25rem 0.75rem; border-radius: 0.75rem; color: #94a3b8; cursor: pointer; transition: all 0.3s; }
        .nav-item:hover, .nav-item.active { background: rgba(245, 158, 11, 0.15); color: #f59e0b; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: #1e293b; border: 1px solid rgba(255,255,255,0.1); border-radius: 1rem; padding: 2rem; width: 90%; max-width: 500px; }
        .btn { padding: 0.625rem 1.25rem; border-radius: 0.5rem; font-weight: 600; cursor: pointer; transition: all 0.2s; border: none; }
        .btn-amber { background: #f59e0b; color: white; }
        .btn-danger { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }
        .input { width: 100%; padding: 0.75rem; background: rgba(15, 23, 42, 0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 0.5rem; color: white; margin-top: 0.25rem; }
        .toast { position: fixed; bottom: 2rem; right: 2rem; padding: 1rem 1.5rem; border-radius: 0.75rem; color: white; font-weight: 500; transform: translateX(400px); transition: transform 0.3s; z-index: 2000; }
        .toast.show { transform: translateX(0); }
        .toast.success { background: #10b981; }
    </style>
</head>
<body>
    <div id="toast" class="toast"></div>
    
    <aside class="sidebar">
        <div class="p-6 border-b border-white/10">
            <div class="flex items-center gap-3">
                <img src="https://cmc.ac.ma/sites/default/files/2023-01/logo-cmc.png" class="h-10 bg-white/10 rounded-lg p-1" onerror="this.style.display='none'">
                <div>
                    <h1 class="font-bold text-lg text-white">SGSN CMC</h1>
                    <p class="text-xs text-amber-400">Gestionnaire</p>
                </div>
            </div>
        </div>
        <nav class="py-4">
            <div class="nav-item active" onclick="showSection('absences')">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                Absences
            </div>
            <div class="nav-item" onclick="showSection('emploi')">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                Emploi du Temps
            </div>
            <div class="nav-item" onclick="logout()">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                Déconnexion
            </div>
        </nav>
    </aside>

    <main class="main">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h2 class="text-2xl font-bold">Bonjour, <span id="userName" class="text-amber-400"></span></h2>
                <p class="text-slate-400 text-sm mt-1">Gestion des absences et emplois du temps</p>
            </div>
            <div class="flex gap-2">
                <button onclick="openModal('addAbsenceModal')" class="btn btn-amber">+ Absence</button>
                <button onclick="openModal('addEmploiModal')" class="btn btn-amber">+ Emploi</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="glass p-6">
                <h3 class="text-lg font-bold text-amber-400 mb-4 flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    Absences Récentes
                </h3>
                <div id="absencesList" class="space-y-3"></div>
            </div>
            <div class="glass p-6">
                <h3 class="text-lg font-bold text-blue-400 mb-4 flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                    Emploi du Temps
                </h3>
                <div id="emploiList" class="space-y-3"></div>
            </div>
        </div>
    </main>

    <!-- Add Absence Modal -->
    <div id="addAbsenceModal" class="modal">
        <div class="modal-content">
            <h3 class="text-xl font-bold mb-6 text-amber-400">Ajouter Absence</h3>
            <form onsubmit="saveAbsence(event)">
                <div class="mb-4">
                    <label class="block text-sm text-slate-400 mb-1">Stagiaire</label>
                    <select name="stagiaire_id" id="absStagiaire" class="input" required></select>
                </div>
                <div class="mb-6">
                    <label class="block text-sm text-slate-400 mb-1">Module</label>
                    <select name="module_id" id="absModule" class="input" required></select>
                </div>
                <div class="flex gap-3 justify-end">
                    <button type="button" onclick="closeModal('addAbsenceModal')" class="btn text-slate-300">Annuler</button>
                    <button type="submit" class="btn btn-amber">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Add Emploi Modal -->
    <div id="addEmploiModal" class="modal">
        <div class="modal-content">
            <h3 class="text-xl font-bold mb-6 text-blue-400">Ajouter Séance</h3>
            <form onsubmit="saveEmploi(event)">
                <div class="mb-4">
                    <label class="block text-sm text-slate-400 mb-1">Jour</label>
                    <select name="jour" class="input" required>
                        <option value="Lundi">Lundi</option>
                        <option value="Mardi">Mardi</option>
                        <option value="Mercredi">Mercredi</option>
                        <option value="Jeudi">Jeudi</option>
                        <option value="Vendredi">Vendredi</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-sm text-slate-400 mb-1">Début</label>
                        <input type="time" name="heure_debut" class="input" required value="08:30">
                    </div>
                    <div>
                        <label class="block text-sm text-slate-400 mb-1">Fin</label>
                        <input type="time" name="heure_fin" class="input" required value="11:00">
                    </div>
                </div>
                <div class="mb-4">
                    <label class="block text-sm text-slate-400 mb-1">Module</label>
                    <select name="module_id" id="empModule" class="input" required></select>
                </div>
                <div class="mb-6">
                    <label class="block text-sm text-slate-400 mb-1">Salle</label>
                    <input type="text" name="salle" class="input" required placeholder="Salle 102">
                </div>
                <div class="flex gap-3 justify-end">
                    <button type="button" onclick="closeModal('addEmploiModal')" class="btn text-slate-300">Annuler</button>
                    <button type="submit" class="btn btn-amber">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user || user.role !== 'Gestionnaire') location.href = '/';
        document.getElementById('userName').innerText = user.nom.split(' ')[0];

        function logout() { localStorage.clear(); location.href = '/'; }
        function showToast(msg, type='success') {
            const t = document.getElementById('toast');
            t.textContent = msg; t.className = 'toast ' + type; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }
        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        async function loadSelects() {
            const [stagiaires, modules] = await Promise.all([
                fetch('/api/stagiaires').then(r=>r.json()),
                fetch('/api/modules').then(r=>r.json())
            ]);
            
            document.getElementById('absStagiaire').innerHTML = stagiaires.map(s=>`<option value="${s.stagiaire_id}">${s.nom}</option>`).join('');
            document.getElementById('absModule').innerHTML = modules.map(m=>`<option value="${m.id}">${m.nom_module}</option>`).join('');
            document.getElementById('empModule').innerHTML = modules.map(m=>`<option value="${m.id}">${m.nom_module}</option>`).join('');
        }

        async function loadAbsences() {
            const res = await fetch('/api/absences');
            const data = await res.json();
            document.getElementById('absencesList').innerHTML = data.slice(0,5).map(a=>`
                <div class="flex justify-between items-center bg-slate-800/50 p-4 rounded-xl border-l-4 ${a.justifiee ? 'border-green-500' : 'border-red-500'}">
                    <div>
                        <span class="font-bold text-white block">${a.stagiaire}</span>
                        <span class="text-xs text-slate-400">${a.nom_module} • ${a.date_absence.split('T')[0]}</span>
                    </div>
                    <div class="flex gap-2">
                        ${!a.justifiee ? `<button onclick="justifier(${a.id})" class="text-amber-400 hover:text-amber-300 text-sm">Justifier</button>` : '<span class="text-green-400 text-sm">✓</span>'}
                        <button onclick="deleteAbsence(${a.id})" class="text-red-400 hover:text-red-300 text-sm">×</button>
                    </div>
                </div>
            `).join('');
        }

        async function loadEmploi() {
            const res = await fetch('/api/emploi/1');
            const data = await res.json();
            document.getElementById('emploiList').innerHTML = data.map(e=>`
                <div class="flex justify-between items-center bg-slate-800/50 p-4 rounded-xl hover:bg-slate-800 transition">
                    <div>
                        <span class="font-bold text-blue-400">${e.jour}</span>
                        <span class="text-slate-400 text-sm ml-2">${e.heure_debut.slice(0,5)} - ${e.heure_fin.slice(0,5)}</span>
                        <p class="text-white mt-1">${e.nom_module}</p>
                    </div>
                    <div class="flex gap-2">
                        <span class="text-xs bg-slate-700 px-3 py-1 rounded-lg text-slate-300">${e.salle}</span>
                        <button onclick="deleteEmploi(${e.id})" class="text-red-400 hover:text-red-300">×</button>
                    </div>
                </div>
            `).join('');
        }

        async function saveAbsence(e) {
            e.preventDefault();
            const f = e.target;
            try {
                await fetch('/api/absences', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ stagiaire_id: f.stagiaire_id.value, module_id: f.module_id.value })
                });
                showToast('Absence ajoutée!');
                closeModal('addAbsenceModal'); loadAbsences();
            } catch(e) { showToast('Erreur', 'error'); }
        }

        async function saveEmploi(e) {
            e.preventDefault();
            const f = e.target;
            try {
                await fetch('/api/emploi', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        classe_id: 1,
                        jour: f.jour.value,
                        heure_debut: f.heure_debut.value,
                        heure_fin: f.heure_fin.value,
                        module_id: f.module_id.value,
                        salle: f.salle.value
                    })
                });
                showToast('Séance ajoutée!');
                closeModal('addEmploiModal'); loadEmploi();
            } catch(e) { showToast('Erreur', 'error'); }
        }

        async function justifier(id) {
            await fetch(`/api/absences/${id}/justifier`, {method: 'PUT'});
            showToast('Justifiée!'); loadAbsences();
        }

        async function deleteAbsence(id) {
            if (!confirm('Supprimer?')) return;
            await fetch(`/api/absences/${id}`, {method: 'DELETE'});
            showToast('Supprimée!'); loadAbsences();
        }

        async function deleteEmploi(id) {
            if (!confirm('Supprimer?')) return;
            await fetch(`/api/emploi/${id}`, {method: 'DELETE'});
            showToast('Supprimée!'); loadEmploi();
        }

        loadSelects(); loadAbsences(); loadEmploi();
    </script>
</body>
</html>
