<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGSN CMC | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; }
        .glass { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .sidebar { width: 260px; background: rgba(15, 23, 42, 0.95); border-right: 1px solid rgba(255,255,255,0.1); height: 100vh; position: fixed; left: 0; top: 0; }
        .main { margin-left: 260px; padding: 2rem; }
        .nav-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.875rem 1.25rem; margin: 0.25rem 0.75rem; border-radius: 0.75rem; color: #94a3b8; cursor: pointer; transition: all 0.3s; }
        .nav-item:hover, .nav-item.active { background: rgba(59, 130, 246, 0.15); color: #60a5fa; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: #1e293b; border: 1px solid rgba(255,255,255,0.1); border-radius: 1rem; padding: 2rem; width: 90%; max-width: 500px; }
        .btn { padding: 0.625rem 1.25rem; border-radius: 0.5rem; font-weight: 600; cursor: pointer; transition: all 0.2s; border: none; }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-danger { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }
        .btn-success { background: #10b981; color: white; }
        .input { width: 100%; padding: 0.75rem; background: rgba(15, 23, 42, 0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 0.5rem; color: white; margin-top: 0.25rem; }
        .input:focus { outline: none; border-color: #3b82f6; }
        .toast { position: fixed; bottom: 2rem; right: 2rem; padding: 1rem 1.5rem; border-radius: 0.75rem; color: white; font-weight: 500; transform: translateX(400px); transition: transform 0.3s; z-index: 2000; }
        .toast.show { transform: translateX(0); }
        .toast.success { background: #10b981; }
        .toast.error { background: #ef4444; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 1rem; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { background: rgba(15, 23, 42, 0.5); color: #94a3b8; font-size: 0.75rem; text-transform: uppercase; }
        tr:hover { background: rgba(255,255,255,0.02); }
    </style>
</head>
<body>
    <div id="toast" class="toast"></div>
    
    <aside class="sidebar">
        <div class="p-6 border-b border-white/10">
            <div class="flex items-center gap-3">
                <img src="https://cmc.ac.ma/sites/default/files/2023-01/logo-cmc.png" class="h-10 bg-white/10 rounded-lg p-1" onerror="this.style.display='none'">
                <div>
                    <h1 class="font-bold text-lg text-white">SGSN CMC</h1>
                    <p class="text-xs text-blue-400">Espace Admin</p>
                </div>
            </div>
        </div>
        <nav class="py-4">
            <div class="nav-item active" onclick="showSection('dashboard')">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
                Dashboard
            </div>
            <div class="nav-item" onclick="showSection('stagiaires')">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                Stagiaires
            </div>
            <div class="nav-item" onclick="logout()">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                Déconnexion
            </div>
        </nav>
    </aside>

    <main class="main">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h2 class="text-2xl font-bold" id="pageTitle">Tableau de Bord</h2>
                <p class="text-slate-400 text-sm mt-1">Bienvenue, <span id="userName"></span></p>
            </div>
            <button onclick="openModal('addModal')" class="btn btn-primary flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                Ajouter Stagiaire
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="glass p-6 rounded-xl border-l-4 border-blue-500">
                <p class="text-slate-400 text-sm mb-1">Total Stagiaires</p>
                <p class="text-3xl font-bold" id="totalStagiaires">0</p>
            </div>
            <div class="glass p-6 rounded-xl border-l-4 border-red-500">
                <p class="text-slate-400 text-sm mb-1">Absences</p>
                <p class="text-3xl font-bold text-red-400">2</p>
            </div>
            <div class="glass p-6 rounded-xl border-l-4 border-green-500">
                <p class="text-slate-400 text-sm mb-1">Moyenne</p>
                <p class="text-3xl font-bold text-green-400">15.4</p>
            </div>
            <div class="glass p-6 rounded-xl border-l-4 border-purple-500">
                <p class="text-slate-400 text-sm mb-1">Modules</p>
                <p class="text-3xl font-bold text-purple-400">4</p>
            </div>
        </div>

        <div class="glass rounded-xl overflow-hidden">
            <table>
                <thead>
                    <tr>
                        <th>Stagiaire</th>
                        <th>Email</th>
                        <th>Classe</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </main>

    <!-- Add Modal -->
    <div id="addModal" class="modal">
        <div class="modal-content">
            <h3 class="text-xl font-bold mb-6">Ajouter Stagiaire</h3>
            <form onsubmit="saveStagiaire(event)">
                <div class="mb-4">
                    <label class="block text-sm text-slate-400 mb-1">Nom Complet</label>
                    <input type="text" name="nom" class="input" required placeholder="Alaa Benkaddour">
                </div>
                <div class="mb-4">
                    <label class="block text-sm text-slate-400 mb-1">Email</label>
                    <input type="email" name="email" class="input" required placeholder="alaa@cmc.ma">
                </div>
                <div class="mb-6">
                    <label class="block text-sm text-slate-400 mb-1">Mot de passe</label>
                    <input type="password" name="password" class="input" value="123456">
                </div>
                <div class="flex gap-3 justify-end">
                    <button type="button" onclick="closeModal('addModal')" class="btn text-slate-300">Annuler</button>
                    <button type="submit" class="btn btn-primary">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3 class="text-xl font-bold mb-6">Modifier Stagiaire</h3>
            <form onsubmit="updateStagiaire(event)">
                <input type="hidden" name="id" id="editId">
                <div class="mb-4">
                    <label class="block text-sm text-slate-400 mb-1">Nom</label>
                    <input type="text" name="nom" id="editNom" class="input" required>
                </div>
                <div class="mb-6">
                    <label class="block text-sm text-slate-400 mb-1">Email</label>
                    <input type="email" name="email" id="editEmail" class="input" required>
                </div>
                <div class="flex gap-3 justify-end">
                    <button type="button" onclick="closeModal('editModal')" class="btn text-slate-300">Annuler</button>
                    <button type="submit" class="btn btn-primary">Modifier</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user || user.role !== 'Admin') location.href = '/';
        document.getElementById('userName').innerText = user.nom;

        function logout() { localStorage.clear(); location.href = '/'; }
        function showToast(msg, type='success') {
            const t = document.getElementById('toast');
            t.textContent = msg; t.className = 'toast ' + type; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }
        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        async function loadData() {
            try {
                const res = await fetch('/api/stagiaires');
                const data = await res.json();
                document.getElementById('totalStagiaires').innerText = data.length;
                document.getElementById('tableBody').innerHTML = data.map(s => `
                    <tr>
                        <td class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full bg-gradient-to-br from-blue-500 to-cyan-400 flex items-center justify-center text-white font-bold text-sm">
                                ${s.nom.split(' ').map(n=>n[0]).join('').substring(0,2)}
                            </div>
                            <span class="font-medium text-white">${s.nom}</span>
                        </td>
                        <td class="text-slate-400">${s.email}</td>
                        <td><span class="bg-blue-500/10 text-blue-400 px-3 py-1 rounded-full text-xs">${s.nom_classe}</span></td>
                        <td>
                            <div class="flex gap-2">
                                <button onclick="editStagiaire(${s.id}, '${s.nom}', '${s.email}')" class="text-blue-400 hover:text-blue-300 text-sm font-medium">Modifier</button>
                                <button onclick="deleteStagiaire(${s.id})" class="text-red-400 hover:text-red-300 text-sm font-medium">Supprimer</button>
                            </div>
                        </td>
                    </tr>
                `).join('');
            } catch (e) { showToast('Erreur chargement', 'error'); }
        }

        async function saveStagiaire(e) {
            e.preventDefault();
            const f = e.target;
            try {
                const res = await fetch('/api/stagiaires', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ nom: f.nom.value, email: f.email.value, password: f.password.value })
                });
                if (res.ok) {
                    showToast('Stagiaire ajouté!');
                    closeModal('addModal'); f.reset(); loadData();
                } else throw new Error();
            } catch(e) { showToast('Erreur ajout', 'error'); }
        }

        function editStagiaire(id, nom, email) {
            document.getElementById('editId').value = id;
            document.getElementById('editNom').value = nom;
            document.getElementById('editEmail').value = email;
            openModal('editModal');
        }

        async function updateStagiaire(e) {
            e.preventDefault();
            const f = e.target;
            try {
                const res = await fetch(`/api/stagiaires/${f.id.value}`, {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ nom: f.nom.value, email: f.email.value })
                });
                if (res.ok) {
                    showToast('Modifié avec succès!');
                    closeModal('editModal'); loadData();
                } else throw new Error();
            } catch(e) { showToast('Erreur modification', 'error'); }
        }

        async function deleteStagiaire(id) {
            if (!confirm('Supprimer ce stagiaire?')) return;
            try {
                const res = await fetch(`/api/stagiaires/${id}`, { method: 'DELETE' });
                if (res.ok) { showToast('Supprimé!'); loadData(); }
                else throw new Error();
            } catch(e) { showToast('Erreur suppression', 'error'); }
        }

        loadData();
    </script>
</body>
</html>
