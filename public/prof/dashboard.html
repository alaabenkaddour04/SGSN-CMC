<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGSN CMC | Professeur</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; }
        .glass { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); border-radius: 1rem; }
        .sidebar { width: 260px; background: rgba(15, 23, 42, 0.95); border-right: 1px solid rgba(255,255,255,0.1); height: 100vh; position: fixed; left: 0; top: 0; }
        .main { margin-left: 260px; padding: 2rem; }
        .nav-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.875rem 1.25rem; margin: 0.25rem 0.75rem; border-radius: 0.75rem; color: #94a3b8; cursor: pointer; transition: all 0.3s; }
        .nav-item:hover, .nav-item.active { background: rgba(16, 185, 129, 0.15); color: #10b981; }
        .btn { padding: 0.625rem 1.25rem; border-radius: 0.5rem; font-weight: 600; cursor: pointer; transition: all 0.2s; border: none; }
        .btn-emerald { background: #10b981; color: white; }
        .input { width: 100%; padding: 0.75rem; background: rgba(15, 23, 42, 0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 0.5rem; color: white; }
        .input:focus { outline: none; border-color: #10b981; }
        .toast { position: fixed; bottom: 2rem; right: 2rem; padding: 1rem 1.5rem; border-radius: 0.75rem; color: white; font-weight: 500; transform: translateX(400px); transition: transform 0.3s; z-index: 2000; }
        .toast.show { transform: translateX(0); }
        .toast.success { background: #10b981; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 1rem; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { background: rgba(15, 23, 42, 0.5); color: #94a3b8; font-size: 0.75rem; text-transform: uppercase; }
        .note-input { width: 80px; text-align: center; background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255,255,255,0.1); border-radius: 0.5rem; color: white; padding: 0.5rem; }
        .absence-check { width: 1.5rem; height: 1.5rem; accent-color: #ef4444; }
    </style>
</head>
<body>
    <div id="toast" class="toast"></div>
    
    <aside class="sidebar">
        <div class="p-6 border-b border-white/10">
            <div class="flex items-center gap-3">
                <img src="https://cmc.ac.ma/sites/default/files/2023-01/logo-cmc.png" class="h-10 bg-white/10 rounded-lg p-1" onerror="this.style.display='none'">
                <div>
                    <h1 class="font-bold text-lg text-white">SGSN CMC</h1>
                    <p class="text-xs text-emerald-400">Professeur</p>
                </div>
            </div>
        </div>
        <nav class="py-4">
            <div class="nav-item active">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                Saisie Notes
            </div>
            <div class="nav-item" onclick="logout()">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                Déconnexion
            </div>
        </nav>
    </aside>

    <main class="main">
        <div class="mb-8">
            <h2 class="text-2xl font-bold">Bonjour, <span id="profName" class="text-emerald-400"></span></h2>
            <p class="text-slate-400 text-sm mt-1">Saisie des notes et absences</p>
        </div>

        <div class="glass p-6 mb-6">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                <div>
                    <label class="block text-slate-400 text-sm mb-2">Module</label>
                    <select id="moduleSelect" class="input" onchange="loadStagiaires()">
                        <option value="">Choisir...</option>
                        <option value="1">Cloud Computing</option>
                        <option value="2">Réseaux</option>
                        <option value="3">Sécurité</option>
                        <option value="4">Linux Admin</option>
                    </select>
                </div>
                <div>
                    <label class="block text-slate-400 text-sm mb-2">Date</label>
                    <input type="date" id="dateSelect" class="input">
                </div>
                <div class="flex items-end">
                    <button onclick="loadStagiaires()" class="btn btn-emerald w-full">Charger Stagiaires</button>
                </div>
            </div>

            <div id="saisieSection" class="hidden">
                <div class="overflow-x-auto">
                    <table>
                        <thead>
                            <tr>
                                <th>Stagiaire</th>
                                <th>Note /20</th>
                                <th>Absent</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="stagiairesTable"></tbody>
                    </table>
                </div>
                <div class="mt-6 flex justify-end">
                    <button onclick="saveAll()" class="btn btn-emerald text-lg px-8 py-3 shadow-lg shadow-emerald-500/30">
                        💾 Enregistrer Tout
                    </button>
                </div>
            </div>
            
            <div id="emptyState" class="text-center py-12 text-slate-500">
                <svg class="w-16 h-16 mx-auto mb-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                <p>Sélectionnez un module pour commencer</p>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="glass p-6 border-l-4 border-emerald-500">
                <h3 class="text-lg font-bold text-white mb-2">Moyenne Classe</h3>
                <p class="text-3xl font-bold text-emerald-400">15.4</p>
            </div>
            <div class="glass p-6 border-l-4 border-blue-500">
                <h3 class="text-lg font-bold text-white mb-2">Présence</h3>
                <p class="text-3xl font-bold text-blue-400">92%</p>
            </div>
            <div class="glass p-6 border-l-4 border-purple-500">
                <h3 class="text-lg font-bold text-white mb-2">Stagiaires</h3>
                <p class="text-3xl font-bold text-purple-400">3</p>
            </div>
        </div>
    </main>

    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user || user.role !== 'Professeur') location.href = '/';
        document.getElementById('profName').innerText = user.nom.split(' ').pop();
        document.getElementById('dateSelect').valueAsDate = new Date();

        function logout() { localStorage.clear(); location.href = '/'; }
        function showToast(msg, type='success') {
            const t = document.getElementById('toast');
            t.textContent = msg; t.className = 'toast ' + type; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        let stagiairesData = [];

        async function loadStagiaires() {
            const module = document.getElementById('moduleSelect').value;
            if (!module) { alert('Choisir module'); return; }
            
            const res = await fetch('/api/stagiaires');
            stagiairesData = await res.json();
            
            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('saisieSection').classList.remove('hidden');
            
            document.getElementById('stagiairesTable').innerHTML = stagiairesData.map(s=>`
                <tr data-id="${s.stagiaire_id}">
                    <td class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-gradient-to-br from-emerald-500 to-teal-400 flex items-center justify-center text-white font-bold text-sm">
                            ${s.nom.split(' ').map(n=>n[0]).join('').substring(0,2)}
                        </div>
                        <div>
                            <span class="font-medium text-white block">${s.nom}</span>
                            <span class="text-xs text-slate-400">${s.email}</span>
                        </div>
                    </td>
                    <td>
                        <input type="number" min="0" max="20" step="0.5" class="note-input" id="note_${s.stagiaire_id}" placeholder="--">
                    </td>
                    <td>
                        <label class="flex items-center cursor-pointer">
                            <input type="checkbox" class="absence-check" id="abs_${s.stagiaire_id}">
                            <span class="ml-2 text-sm text-slate-400">Absent</span>
                        </label>
                    </td>
                    <td>
                        <button onclick="saveOne(${s.stagiaire_id})" class="text-emerald-400 hover:text-emerald-300 text-sm font-medium">
                            Enregistrer
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        async function saveOne(stagId) {
            const module = document.getElementById('moduleSelect').value;
            const note = document.getElementById(`note_${stagId}`).value;
            const absent = document.getElementById(`abs_${stagId}`).checked;
            
            if (note) {
                await fetch('/api/notes', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({stagiaire_id: stagId, module_id: module, note: note})
                });
            }
            
            if (absent) {
                await fetch('/api/absences', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({stagiaire_id: stagId, module_id: module})
                });
            }
            
            showToast('Enregistré!');
        }

        async function saveAll() {
            const module = document.getElementById('moduleSelect').value;
            for (let s of stagiairesData) {
                const note = document.getElementById(`note_${s.stagiaire_id}`).value;
                const absent = document.getElementById(`abs_${s.stagiaire_id}`).checked;
                
                if (note) {
                    await fetch('/api/notes', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({stagiaire_id: s.stagiaire_id, module_id: module, note: note})
                    });
                }
                if (absent) {
                    await fetch('/api/absences', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({stagiaire_id: s.stagiaire_id, module_id: module})
                    });
                }
            }
            showToast('Tout enregistré avec succès!');
        }
    </script>
</body>
</html>
